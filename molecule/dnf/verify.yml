---
- name: Verify
  hosts: all
  tasks:
    - name: Confirm Go is installed via dnf
      ansible.builtin.command: /usr/lib/golang/bin/go version
      register: go_ver
      changed_when: false

    - name: Print version
      ansible.builtin.debug:
        var: go_ver.stdout

    - name: Confirm golang package is installed
      ansible.builtin.dnf:
        name: golang
        state: present
      check_mode: true
      register: dnf_check
      failed_when: dnf_check.changed
