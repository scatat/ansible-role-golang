---
- name: Verify
  hosts: all
  tasks:
    - name: Confirm Go is installed via apt
      ansible.builtin.command: /usr/lib/go/bin/go version
      register: go_ver
      changed_when: false

    - name: Print version
      ansible.builtin.debug:
        var: go_ver.stdout

    - name: Confirm golang-go package is installed
      ansible.builtin.command: dpkg -l golang-go
      register: dpkg_check
      changed_when: false
      failed_when: dpkg_check.rc != 0
