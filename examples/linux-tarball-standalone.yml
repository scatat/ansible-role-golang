---
# Linux tarball — pinned version, standalone, go available in new shells
#
# Usage:
#   ansible-galaxy install scatat.golang
#   ansible-playbook examples/linux-tarball-standalone.yml
#
- name: Install Go via tarball (standalone)
  hosts: localhost
  become: true
  roles:
    - role: scatat.golang
      golang_package_manager: tarball
      golang_version: "1.24.4"
      golang_configure_profile: true
      tags: [golang]
