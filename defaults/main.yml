---
# roles/golang/defaults/main.yml
#
# Shell-agnostic Go language SDK setup.
# Exposes golang_shell_env as a loose interface for shell roles to consume.
# Exposes golang_cache_dir for disk-cleanup integration.
#
# See README.md for contract patterns and leaky abstractions.

# Enable/disable the role
golang_enabled: true

# Desired state: present (install if missing), latest (install or upgrade), absent (uninstall)
golang_state: "present"

# Package manager: extensible to other providers.
# Add tasks/install-<manager>.yml + tasks/uninstall-<manager>.yml to support new ones.
# Options: homebrew, tarball, apt, dnf
golang_package_manager: "homebrew"

# Go version — used by tarball method for download URL.
# Homebrew manages its own version (latest stable).
golang_version: "1.26.0"

# Minimum acceptable version for verify assertions.
# Catches L6 (version currency).
golang_minimum_version: "1.22"

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------

# GOROOT: derived in vars/main.yml from golang_package_manager.
# See vars/main.yml for _golang_goroot_by_manager and golang_goroot.

# GOPATH: user workspace for go modules, packages, build artifacts.
golang_gopath: "{{ ansible_user_home | default(lookup('env', 'HOME')) }}/go"

# GOBIN: where `go install` puts binaries.
golang_gobin: "{{ ansible_user_home | default(lookup('env', 'HOME')) }}/go/bin"

# ---------------------------------------------------------------------------
# Tarball-specific configuration
# ---------------------------------------------------------------------------

# Mirror URL for Go tarball downloads.
golang_tarball_mirror: "https://go.dev/dl"

# Checksum mirror URL. go.dev/dl uses HTML meta-refresh for .sha256 files
# which Ansible cannot follow. The actual checksums live on the Google CDN.
golang_tarball_checksum_mirror: "https://dl.google.com/go"

# Installation directory for tarball method (extracted here).
golang_tarball_install_dir: "/usr/local/go"

# Tarball derivation (arch_map, os_map, filename, url) lives in vars/main.yml.

# Directory for downloaded tarballs.
golang_tarball_download_dir: "{{ ansible_user_home | default(lookup('env', 'HOME')) }}/.ansible/tmp/downloads"

# ---------------------------------------------------------------------------
# Uninstall options
# ---------------------------------------------------------------------------

# Clean go build cache on uninstall.
# Catches L8 (uninstall completeness).
golang_clean_cache_on_uninstall: true

# ---------------------------------------------------------------------------
# Shell profile configuration (opt-in)
# ---------------------------------------------------------------------------
# Write Go environment to a shell profile file.
# Default: false (the role exports golang_shell_env for shell roles to consume).
# Set to true for a self-contained setup without a separate shell role.
golang_configure_profile: false

# Path to write the profile script.
# Default: /etc/profile.d/golang.sh (system-wide, requires become).
# Override for user-specific: "{{ ansible_user_home }}/.profile.d/golang.sh"
golang_profile_path: "/etc/profile.d/golang.sh"

# ---------------------------------------------------------------------------
# Facts export (ansible_local)
# ---------------------------------------------------------------------------
# Export ansible_local.golang.general.* facts for cross-role discovery.
# Writes to /etc/ansible/facts.d/golang.fact (requires become).
# Other roles can then use: ansible_local.golang.general.version, .home, .gopath, .gobin
golang_export_facts: false

# ---------------------------------------------------------------------------
# Go packages (installed via `go install`)
# ---------------------------------------------------------------------------
# List of Go packages to install. Each entry should include the @version suffix.
# Example:
#   golang_packages:
#     - golang.org/x/tools/gopls@latest
#     - github.com/golangci/golangci-lint/cmd/golangci-lint@latest
#     - github.com/go-delve/delve/cmd/dlv@latest
golang_packages: []

# ---------------------------------------------------------------------------
# Extra environment variables (extensible)
# ---------------------------------------------------------------------------

# Add GOPROXY, GOPRIVATE, etc. when needed.
# These merge into golang_shell_env.vars.
# Example:
#   golang_extra_env:
#     GOPROXY: "https://proxy.golang.org,direct"
#     GOPRIVATE: "github.com/transferwise/*"
golang_extra_env: {}

# Shell-agnostic interface (golang_shell_env) and cache path (golang_cache_dir)
# are computed in vars/main.yml. See vars/main.yml for details.
