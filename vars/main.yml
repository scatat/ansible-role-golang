---
# roles/golang/vars/main.yml
#
# Computed variables — NOT user-overridable.
# These are derived from user-configurable defaults in defaults/main.yml.
# Placing them here (vars/) signals intent and prevents accidental override.

# ---------------------------------------------------------------------------
# GOROOT derivation
# ---------------------------------------------------------------------------

# Internal lookup: package manager → GOROOT path.
_golang_goroot_by_manager:
  homebrew: "{{ homebrew_prefix | default('/opt/homebrew') }}/opt/go/libexec"
  tarball: "{{ golang_tarball_install_dir }}"
  apt: "/usr/lib/go"
  dnf: "/usr/lib/golang"

golang_goroot: "{{ _golang_goroot_by_manager[golang_package_manager] }}"

# ---------------------------------------------------------------------------
# Tarball derivation
# ---------------------------------------------------------------------------

# Architecture mapping: ansible_architecture → Go arch string.
# Catches L7 (tarball arch mismatch).
golang_arch_map:
  x86_64: "amd64"
  arm64: "arm64"
  aarch64: "arm64"

# OS mapping: ansible_system → Go OS string.
golang_os_map:
  Darwin: "darwin"
  Linux: "linux"

# Derived tarball filename (used internally by install-tarball.yml).
golang_tarball_filename: "go{{ golang_version }}.{{ golang_os_map[ansible_system | default('Linux')] }}-{{ golang_arch_map[ansible_architecture | default('x86_64')] }}.tar.gz"

# Derived tarball URL.
golang_tarball_url: "{{ golang_tarball_mirror }}/{{ golang_tarball_filename }}"

# ---------------------------------------------------------------------------
# Shell-agnostic interface (produced by this role, consumed by shell roles)
# ---------------------------------------------------------------------------
# Any shell role consumes this dict. The golang role never writes shell config.
# Fish: `set -x` + `fish_add_path`. Zsh/Bash: `export` + PATH.
# Catches L4 (shell env export).

golang_shell_env:
  vars: "{{ {'GOPATH': golang_gopath, 'GOBIN': golang_gobin, 'GOROOT': golang_goroot} | combine(golang_extra_env) }}"
  paths:
    - "{{ golang_goroot }}/bin"
    - "{{ golang_gobin }}"

# ---------------------------------------------------------------------------
# Cache path interface (produced by this role, consumed by disk-cleanup role)
# ---------------------------------------------------------------------------
# Catches L9 (cache path coupling).
# disk-cleanup should reference this instead of hardcoding.

golang_cache_dir: "{{ ((ansible_system | default('Linux')) == 'Darwin') | ternary((ansible_user_home | default(lookup('env', 'HOME'))) + '/Library/Caches/go-build', (ansible_user_home | default(lookup('env', 'HOME'))) + '/.cache/go-build') }}"
