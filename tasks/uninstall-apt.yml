---
# roles/golang/tasks/uninstall-apt.yml
# Uninstall Go installed via apt.
# Catches L8: uninstall completeness.

- name: Remove Go via apt
  ansible.builtin.apt:
    name: golang-go
    state: absent
    autoremove: true
  become: true

- name: Clean Go build cache
  ansible.builtin.file:
    path: "{{ golang_cache_dir }}"
    state: absent
  when: golang_clean_cache_on_uninstall

- name: Clean Go module cache
  ansible.builtin.file:
    path: "{{ golang_gopath }}/pkg/mod"
    state: absent
  when: golang_clean_cache_on_uninstall
