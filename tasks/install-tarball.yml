---
# roles/golang/tasks/install-tarball.yml
# Install Go from official tarball (cross-platform).
# Catches L2 (GOROOT location), L7 (tarball arch).

- name: Check currently installed Go version
  ansible.builtin.command: "{{ golang_tarball_install_dir }}/bin/go version"
  register: _golang_current_version
  changed_when: false
  failed_when: false

- name: Set tarball skip fact
  ansible.builtin.set_fact:
    _golang_tarball_skip: "{{ _golang_current_version.rc == 0 and ('go' + golang_version) in _golang_current_version.stdout }}"

- name: "Skip tarball install — Go {{ golang_version }} already installed"
  ansible.builtin.debug:
    msg: "Go {{ golang_version }} already installed at {{ golang_tarball_install_dir }}, skipping download."
  when: _golang_tarball_skip | bool

- name: Ensure download directory exists
  ansible.builtin.file:
    path: "{{ golang_tarball_download_dir }}"
    state: directory
    mode: "0755"
  when: not (_golang_tarball_skip | bool)

- name: Download Go tarball
  ansible.builtin.get_url:
    url: "{{ golang_tarball_url }}"
    dest: "{{ golang_tarball_download_dir }}/{{ golang_tarball_filename }}"
    checksum: "sha256:{{ golang_tarball_url }}.sha256"
    mode: "0644"
  register: golang_download
  when: not (_golang_tarball_skip | bool)

- name: Remove existing Go installation at tarball path
  ansible.builtin.file:
    path: "{{ golang_tarball_install_dir }}"
    state: absent
  become: true
  when:
    - not (_golang_tarball_skip | bool)
    - golang_download.changed | default(false)

- name: Extract Go tarball
  ansible.builtin.unarchive:
    src: "{{ golang_tarball_download_dir }}/{{ golang_tarball_filename }}"
    dest: "{{ golang_tarball_install_dir | dirname }}"
    remote_src: true
  become: true
  when:
    - not (_golang_tarball_skip | bool)
    - golang_download.changed | default(false)
