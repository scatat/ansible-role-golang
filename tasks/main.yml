---
# roles/golang/tasks/main.yml
# Orchestrator: dispatches to install/uninstall based on golang_state.

- name: "Install/upgrade Go ({{ golang_package_manager }})"
  ansible.builtin.include_tasks: "install-{{ golang_package_manager }}.yml"
  when:
    - golang_enabled
    - golang_state in ['present', 'latest']

- name: Ensure GOPATH directory exists
  ansible.builtin.file:
    path: "{{ golang_gopath }}"
    state: directory
    mode: "0755"
  when:
    - golang_enabled
    - golang_state in ['present', 'latest']

- name: Ensure GOBIN directory exists
  ansible.builtin.file:
    path: "{{ golang_gobin }}"
    state: directory
    mode: "0755"
  when:
    - golang_enabled
    - golang_state in ['present', 'latest']

- name: "Uninstall Go ({{ golang_package_manager }})"
  ansible.builtin.include_tasks: "uninstall-{{ golang_package_manager }}.yml"
  when:
    - golang_enabled
    - golang_state == 'absent'

- name: Configure shell profile
  ansible.builtin.include_tasks: profile.yml
  when:
    - golang_enabled
    - golang_state in ['present', 'latest']
    - golang_configure_profile
  tags: [profile]

- name: Export golang facts
  ansible.builtin.include_tasks: facts.yml
  when:
    - golang_enabled
    - golang_state in ['present', 'latest']
    - golang_export_facts
  tags: [facts]

- name: Install Go packages
  ansible.builtin.include_tasks: packages.yml
  when:
    - golang_enabled
    - golang_state in ['present', 'latest']
    - golang_packages | length > 0
  tags: [packages]

- name: Verify Go installation
  ansible.builtin.include_tasks: verify.yml
  when:
    - golang_enabled
    - golang_state in ['present', 'latest']
  tags: [verify]

- name: Verify Go removal
  ansible.builtin.include_tasks: verify-absent.yml
  when:
    - golang_enabled
    - golang_state == 'absent'
  tags: [verify]
